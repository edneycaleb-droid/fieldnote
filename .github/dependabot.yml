version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      compatible-patches:
        update-types: ["patch"]
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
          - version-update:semver-minor

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/Chicago
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
