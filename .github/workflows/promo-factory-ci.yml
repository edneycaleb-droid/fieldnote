name: Promo Factory CI
on:
  push:
    paths:
      - 'tools/github-repo-promo-factory/**'
      - '.github/workflows/promo-factory-ci.yml'
  pull_request:
    paths:
      - 'tools/github-repo-promo-factory/**'
      - '.github/workflows/promo-factory-ci.yml'
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tools/github-repo-promo-factory
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/github-repo-promo-factory/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npx remotion still src/index.ts PromoLandscape out/smoke.png --frame 90 --scale 0.25
