name: Record Replay Free CI
on:
  push:
    paths:
      - 'tools/record-replay-free/**'
      - 'skills/record_and_replay_free_workflows.md'
      - '.github/workflows/record-replay-free-ci.yml'
  pull_request:
    paths:
      - 'tools/record-replay-free/**'
      - 'skills/record_and_replay_free_workflows.md'
      - '.github/workflows/record-replay-free-ci.yml'
permissions:
  contents: read
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ['3.11', '3.13']
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: tools/record-replay-free
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: tools/record-replay-free/pyproject.toml
      - run: python -m pip install -e ".[test]"
      - run: python -m pytest -q
      - run: rrf replay examples/publish-promo.yml
