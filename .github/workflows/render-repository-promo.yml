name: Render repository promo
on:
  workflow_dispatch:
    inputs:
      repository:
        description: GitHub OWNER/REPO
        required: true
        default: edneycaleb-droid/fieldnote
      accent:
        description: Six-digit hex color
        required: true
        default: '#58f6d2'
permissions:
  contents: read
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: tools/github-repo-promo-factory
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/github-repo-promo-factory/package-lock.json
      - run: npm ci
      - run: npm run promo -- --repo "$REPOSITORY" --accent "$ACCENT"
        env:
          REPOSITORY: ${{ inputs.repository }}
          ACCENT: ${{ inputs.accent }}
          GITHUB_TOKEN: ${{ github.token }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: repository-promo
          path: tools/github-repo-promo-factory/out/
          retention-days: 30
