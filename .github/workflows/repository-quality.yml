name: Repository Quality

on:
  push:
    branches: [main]
    paths:
      - ".github/**"
      - "scripts/**"
      - "agents/**"
      - "fieldnote_mcp/**"
      - "app.py"
      - "main.py"
      - "templates/**"
      - "tests/**"
      - "pyproject.toml"
      - "STATUS.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out without persisted credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Run deterministic offline quality gate
        run: python3 -I scripts/check_repository_quality.py
      - name: Run deterministic unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Compile Python sources
        run: python3 -m compileall -q agents fieldnote_mcp app.py main.py
